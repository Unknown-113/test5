########################################
# SERVER (api-vm)
########################################
- hosts: api-vm
  become: yes
  tasks:
    - name: Install Python environment
      apt:
        name: 
          - python3-pip
          - python3-flask
        update_cache: yes

    - name: Copy API Logic (Aligned with Java)
      copy:
        dest: /root/api.py
        content: |
          from flask import Flask, jsonify
          import hashlib, time

          app = Flask(__name__)
          SECRET = "KYPO_OJT_SECRET_2026" 

          def generate_current_flag():
              t_now = int(time.time() / 60)
              raw = f"{SECRET}:{t_now}"
              h = hashlib.md5(raw.encode()).hexdigest()[:8]
              return f"FLAG_{h}"

          @app.route("/get_flag")
          def get_flag():
              return jsonify({"flag": generate_current_flag()})

          if __name__ == "__main__":
              app.run(host="0.0.0.0", port=8000)

    - name: Run API in background
      shell: "pkill -f api.py || true; nohup python3 /root/api.py > /dev/null 2>&1 &"
      async: 10
      poll: 0

########################################
# STUDENT (student-vm)
########################################
- hosts: student-vm
  become: yes
  tasks:
    - name: Install curl
      apt:
        name: curl
        update_cache: yes

    - name: Create lab user and directory
      user:
        name: user
        shell: /bin/bash
        create_home: yes
    
    - name: Create lab directory
      file:
        path: /home/user/lab
        state: directory
        owner: user
        group: user
        mode: '0755'

    - name: Create flag update script
      copy:
        dest: /usr/local/bin/update_flag.sh
        mode: '0755'
        content: |
          #!/bin/bash
          FLAG=$(curl -s http://10.10.20.10:8000/get_flag | grep -oP '(?<="flag":")[^"]*')
          if [ ! -z "$FLAG" ]; then
              echo "$FLAG" > /home/user/lab/key.txt
              chown user:user /home/user/lab/key.txt
              chmod 644 /home/user/lab/key.txt
          fi

    - name: Run initial flag update
      shell: /usr/local/bin/update_flag.sh

    - name: Set up Cronjob to update every minute
      cron:
        name: "Update Lab Flag"
        minute: "*"
        job: "/usr/local/bin/update_flag.sh"
